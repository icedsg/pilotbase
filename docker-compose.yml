version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pilotbase_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pilotbase
      POSTGRES_USER: pilotbase
      POSTGRES_PASSWORD: pilotbase_secret
    volumes:
      - pilotbase_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilotbase"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pilotbase_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Pilotbase internal database
      DATABASE_URL: "postgresql+psycopg2://pilotbase:pilotbase_secret@db:5432/pilotbase"

      # Security — change both of these before deploying
      SECRET_KEY: "change-me-generate-with-openssl-rand-hex-32"
      ENCRYPTION_KEY: "change-me-generate-with-fernet-generate_key="

      # AI — point to your Ollama instance
      # If Ollama is running on the host machine use host.docker.internal (Mac/Windows)
      # or your host's LAN IP on Linux
      OLLAMA_BASE_URL: "http://host.docker.internal:11434/v1"
      OLLAMA_API_KEY: "ollama"
      OLLAMA_MODEL: "deepseek-r1"
      OLLAMA_FLASH_MODEL: "deepseek-v3"

      # Auth — "anon" for single-user/anonymous mode (default)
      AUTH_BACKEND: "anon"

      # CORS — add your domain here if accessing from a custom URL
      CORS_ORIGINS: "http://localhost:8000"

      # Application
      ENVIRONMENT: production
      STATIC_DIR: "/app/api/static"
      BACKUPS_DIR: "/app/api/backups"

    volumes:
      - pilotbase_backups:/app/api/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  pilotbase_pgdata:
  pilotbase_backups:
