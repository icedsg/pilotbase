version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pilotbase_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pilotbase
      POSTGRES_USER: pilotbase
      POSTGRES_PASSWORD: pilotbase_secret
    volumes:
      - pilotbase_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilotbase"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pilotbase_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+psycopg2://pilotbase:pilotbase_secret@db:5432/pilotbase"
      SECRET_KEY: "change-me-in-production-generate-with-openssl-rand-hex-32"
      ENCRYPTION_KEY: "change-me-must-be-32-url-safe-base64-chars="
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ENVIRONMENT: production
      PILOTBASE_STATIC_DIR: "/app/api/static"
    volumes:
      - pilotbase_backups:/app/api/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  pilotbase_pgdata:
  pilotbase_backups:
